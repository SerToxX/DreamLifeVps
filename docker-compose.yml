networks:
  dreamlife_net:
    driver: bridge
  proxy:
    external: true   # ya existe, la creaste con: docker network create proxy

volumes:
  dreamlife_mysql_data:
  dreamlife_uploads:

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dreamlife_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - dreamlife_uploads:/app/apps/api/uploads
    networks:
      - dreamlife_net    # habla con mysql
      - proxy             # recibe tráfico de Nginx Proxy Manager
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    container_name: dreamlife_web
    restart: unless-stopped
    networks:
      - proxy            # solo necesita salir a internet, no toca mysql
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    container_name: dreamlife_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dreamlife_mysql_data:/var/lib/mysql
    networks:
      - dreamlife_net     # SIN red "proxy" → no llega desde afuera
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
