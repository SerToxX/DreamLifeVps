# Uso: docker compose -f docker-compose.dev.yml up -d
# Levanta SOLO MySQL para desarrollo local. La API y el web
# corren nativos con "pnpm dev" (mucho más rápido que rebuildear
# imágenes Docker en cada cambio).

services:
  mysql:
    image: mysql:8.4
    container_name: dreamlife_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dream_life
      MYSQL_USER: dreamlife
      MYSQL_PASSWORD: dreamlife123
    ports:
      - "3306:3306"   # expuesto a localhost, esto SOLO para dev
    volumes:
      - dreamlife_mysql_dev_data:/var/lib/mysql

volumes:
  dreamlife_mysql_dev_data:
